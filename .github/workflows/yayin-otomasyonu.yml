name: "Otomatik Yayin Tetikleyici"

on:
  schedule:
    # Her gün TSİ 12:05'te çalışır (UTC 09:05)
    - cron: '05 09 * * *'
  workflow_dispatch:

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu Kopyala
        uses: actions/checkout@v3

      - name: Bos Bir Commit At (Siteyi Gunceller)
        run: |
          git config --global user.name "Siber Atolye Bot"
          git config --global user.email "bot@goldenware.tr"
          git commit --allow-empty -m "Planlanmış içerik yayını tetiklendi"
          git push
